name: CD

on:
  # devlop → build les images Docker après CI vert
  workflow_run:
    workflows: [CI]
    branches: [devlop]
    types: [completed]

  # main → retag les images existantes + deploy (pas de rebuild)
  push:
    branches: [main]

jobs:
  # ── Build & push sur devlop ───────────────────────────────────
  # Construit les images une seule fois depuis devlop, taguées :devlop + :sha
  build:
    name: Build & push — ${{ matrix.service }}
    runs-on: ubuntu-latest
    if: |
      github.event_name == 'workflow_run' &&
      github.event.workflow_run.conclusion == 'success'

    permissions:
      contents: read
      packages: write

    strategy:
      matrix:
        include:
          - service: api
            context: .
            dockerfile: Dockerfile
            build-args: |
              SERVICE_DIR=api
              CMD_PATH=/usr/local/bin/api

          - service: optimizer
            context: .
            dockerfile: Dockerfile
            build-args: |
              SERVICE_DIR=optimizer
              CMD_PATH=/usr/local/bin/optimizer

          - service: front
            context: ./front
            dockerfile: front/Dockerfile
            build-args: ""

    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event.workflow_run.head_sha }}

      - name: Login GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: SHA court
        id: sha
        run: echo "value=${GITHUB_SHA:0:7}" >> "$GITHUB_OUTPUT"
        env:
          GITHUB_SHA: ${{ github.event.workflow_run.head_sha }}

      - uses: docker/setup-buildx-action@v3

      - name: Build & push ${{ matrix.service }}
        uses: docker/build-push-action@v6
        with:
          context: ${{ matrix.context }}
          file: ${{ matrix.dockerfile }}
          target: prod
          build-args: ${{ matrix.build-args }}
          push: true
          tags: |
            ghcr.io/${{ github.repository_owner }}/watermark-${{ matrix.service }}:devlop
            ghcr.io/${{ github.repository_owner }}/watermark-${{ matrix.service }}:${{ steps.sha.outputs.value }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  # ── Promote devlop → latest sur main ─────────────────────────
  # Retague les images existantes :devlop en :latest — pas de rebuild
  promote:
    name: Promote :devlop → :latest
    runs-on: ubuntu-latest
    if: github.event_name == 'push'

    permissions:
      contents: read
      packages: write

    steps:
      - name: Login GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - uses: docker/setup-buildx-action@v3

      # Copie le manifest :devlop vers :latest et :sha sans reconstruire l'image
      - name: Retag images
        run: |
          SHA="${GITHUB_SHA:0:7}"
          for service in api optimizer front; do
            IMAGE="ghcr.io/${{ github.repository_owner }}/watermark-${service}"
            docker buildx imagetools create \
              -t "${IMAGE}:latest" \
              -t "${IMAGE}:${SHA}" \
              "${IMAGE}:devlop"
          done
        env:
          GITHUB_SHA: ${{ github.sha }}

  # ── Deploy VPS ────────────────────────────────────────────────
  deploy:
    name: Deploy sur VPS
    runs-on: ubuntu-latest
    needs: promote

    steps:
      - uses: actions/checkout@v4

      - name: SSH → test connexion
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          script: |
            echo "✅ SSH OK — $(whoami)@$(hostname)"
            docker --version
            docker compose version

      - name: SCP → copie docker-compose.yml
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          source: docker-compose.yml
          target: ~/Watermarks/

      - name: SSH → pull & restart
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          script: |
            cd ~/Watermarks

            # Les credentials GHCR sont stockés dans ~/.docker/config.json
            # (docker login ghcr.io fait une seule fois manuellement sur le VPS)
            docker compose pull
            docker compose up -d --remove-orphans

            # Nettoyage des anciennes images pour libérer de l'espace disque
            docker image prune -f
