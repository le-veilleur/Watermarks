name: CD

on:
  # devlop → build les images Docker après CI vert
  workflow_run:
    workflows: [CI]
    branches: [devlop]
    types: [completed]

  # main → rebuild depuis le Dockerfile + deploy
  push:
    branches: [main]

jobs:
  # ── Build & push ───────────────────────────────────────────────
  # devlop : tag :devlop + :sha
  # main   : tag :latest + :sha
  build:
    name: Build & push — ${{ matrix.service }}
    runs-on: ubuntu-latest
    if: |
      (github.event_name == 'workflow_run' && github.event.workflow_run.conclusion == 'success') ||
      github.event_name == 'push'

    permissions:
      contents: read
      packages: write

    strategy:
      matrix:
        include:
          - service: api
            context: .
            dockerfile: Dockerfile
            build-args: |
              SERVICE_DIR=api
              CMD_PATH=/usr/local/bin/api

          - service: optimizer
            context: .
            dockerfile: Dockerfile
            build-args: |
              SERVICE_DIR=optimizer
              CMD_PATH=/usr/local/bin/optimizer

          - service: front
            context: ./front
            dockerfile: front/Dockerfile
            build-args: |
              VITE_API_URL=${{ vars.VITE_API_URL }}

    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event_name == 'workflow_run' && github.event.workflow_run.head_sha || github.sha }}

      - name: Login GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: SHA court
        id: sha
        run: |
          SHA="${{ github.event_name == 'workflow_run' && github.event.workflow_run.head_sha || github.sha }}"
          echo "value=${SHA:0:7}" >> "$GITHUB_OUTPUT"

      - uses: docker/setup-buildx-action@v3

      - name: Tags devlop
        if: github.event_name == 'workflow_run'
        run: |
          echo "TAGS=ghcr.io/${{ github.repository_owner }}/watermark-${{ matrix.service }}:devlop,ghcr.io/${{ github.repository_owner }}/watermark-${{ matrix.service }}:${{ steps.sha.outputs.value }}" >> "$GITHUB_ENV"

      - name: Tags main
        if: github.event_name == 'push'
        run: |
          echo "TAGS=ghcr.io/${{ github.repository_owner }}/watermark-${{ matrix.service }}:latest,ghcr.io/${{ github.repository_owner }}/watermark-${{ matrix.service }}:${{ steps.sha.outputs.value }}" >> "$GITHUB_ENV"

      - name: Build & push ${{ matrix.service }}
        uses: docker/build-push-action@v6
        with:
          context: ${{ matrix.context }}
          file: ${{ matrix.dockerfile }}
          target: prod
          build-args: ${{ matrix.build-args }}
          push: true
          tags: ${{ env.TAGS }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  # ── Deploy VPS ────────────────────────────────────────────────
  deploy:
    name: Deploy sur VPS
    runs-on: ubuntu-latest
    needs: build
    if: github.event_name == 'push'

    steps:
      - uses: actions/checkout@v4

      # Encode le fichier en base64 pour le passer via SSH sans SCP
      - name: Encode docker-compose.yml
        id: compose
        run: echo "content=$(base64 -w 0 docker-compose.yml)" >> "$GITHUB_OUTPUT"

      - name: SSH → copie + deploy
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          script: |
            mkdir -p ~/Watermarks

            # Décode le docker-compose.yml transmis en base64 via SSH (évite d'ouvrir un second port pour SCP)
            echo "${{ steps.compose.outputs.content }}" | base64 -d > ~/Watermarks/docker-compose.yml

            cd ~/Watermarks

            # Les credentials GHCR sont stockés dans ~/.docker/config.json
            # (docker login ghcr.io fait une seule fois manuellement sur le VPS)
            docker compose pull
            docker compose up -d --remove-orphans

            # Nettoyage des anciennes images pour libérer de l'espace disque
            docker image prune -f
